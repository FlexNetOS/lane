name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest, goos: linux,  goarch: amd64, cross: false }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, goos: linux,  goarch: arm64, cross: true }
          - { target: x86_64-apple-darwin,       os: macos-latest,  goos: darwin, goarch: amd64, cross: false }
          - { target: aarch64-apple-darwin,      os: macos-latest,  goos: darwin, goarch: arm64, cross: false }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        env:
          LANE_VERSION: ${{ github.ref_name }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="lane_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$NAME" -C "target/${{ matrix.target }}/release" lane
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$NAME" > "$NAME.sha256"
          else
            shasum -a 256 "$NAME" > "$NAME.sha256"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: lane-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ steps.pkg.outputs.name }}
            ${{ steps.pkg.outputs.name }}.sha256
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble checksums
        working-directory: dist
        run: |
          cat *.sha256 > checksums.txt
          rm -f *.sha256
          ls -la

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
